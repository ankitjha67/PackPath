<div class="relative w-48 h-48 md:w-64 md:h-64 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-2xl pulse-red mb-10 border-8 border-error/10">

</div>
<!-- Progress Ring -->
<svg class="absolute inset-0 w-full h-full rotate-[-90deg]">
<circle class="text-error" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor" stroke-dasharray="100 100" stroke-linecap="round" stroke-width="8"></circle>
</svg>
</div>

<div class="w-full bg-surface-container-highest/60 backdrop-blur-md rounded-full p-1 flex items-center justify-between px-6 mb-8 border border-white/20">
<div class="flex items-center gap-3">
<div class="flex gap-1 items-end h-4">
<div class="w-1 h-2 bg-secondary rounded-full"></div>
<div class="w-1 h-3 bg-secondary rounded-full"></div>
<div class="w-1 h-4 bg-secondary rounded-full"></div>
<div class="w-1 h-2.5 bg-secondary/30 rounded-full"></div>
</div>
<span class="font-label text-[10px] uppercase font-bold text-on-surface-variant tracking-wider">Mesh Signal Active</span>
</div>
<div class="flex items-center gap-2 text-secondary">
<span class="material-symbols-outlined text-sm">wifi_tethering</span>
<span class="font-label text-[10px] uppercase font-black">Live Broadcast</span>
</div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
<!-- Option 1: Pack Only -->
<button class="flex flex-col items-start p-6 bg-surface-container-lowest rounded-full shadow-sm hover:shadow-md transition-all group border border-transparent hover:border-secondary/20">
<div class="w-10 h-10 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">group</span>
</div>
<span class="font-headline font-bold text-lg text-on-surface">Alert Pack Only</span>
<p class="font-body text-xs text-on-surface-variant text-left mt-1">Broadcast high-priority help signal to your group members only.</p>
</button>
<!-- Option 2: Full Emergency -->
<button class="flex flex-col items-start p-6 bg-primary bg-gradient-to-br from-primary to-primary-container text-white rounded-full shadow-lg scale-105 active:scale-100 transition-all">
<div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_police</span>
</div>
<span class="font-headline font-bold text-lg">Alert Pack &amp; 911</span>
<p class="font-body text-xs text-white/80 text-left mt-1">Immediate satellite dispatch to local authorities and pack SOS.</p>
</button>
</div>

<div class="w-14 h-14 rounded-full border-2 border-on-surface-variant/20 flex items-center justify-center group-hover:bg-surface-container-highest transition-colors">

</div>
<span class="mt-3 font-label text-[10px] uppercase font-black text-on-surface-variant tracking-[0.2em]">Cancel (I'm Safe)</span>
</button>
</div>
