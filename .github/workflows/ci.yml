name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + import check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check app

      - name: Import smoke test
        env:
          DATABASE_URL: postgresql+asyncpg://placeholder:placeholder@localhost:5432/placeholder
        run: python -c "from app.main import app; print(app.title, len(app.routes))"

  mobile:
    name: Mobile (flutter analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"
          channel: stable
          cache: true

      - name: Tool versions
        run: |
          flutter --version
          dart --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Format check
        run: |
          dart format --output=none --set-exit-if-changed lib || {
            echo "::error::dart format check failed — running again to show the diff"
            dart format --output=show lib
            exit 1
          }

  alembic:
    name: Backend migrations (Postgres + PostGIS + TimescaleDB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: packpath
          POSTGRES_PASSWORD: packpath
          POSTGRES_DB: packpath
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U packpath"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bootstrap PostGIS + TimescaleDB extensions
        env:
          PGPASSWORD: packpath
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U packpath -d packpath -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h localhost -U packpath -d packpath -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          psql -h localhost -U packpath -d packpath -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://packpath:packpath@localhost:5432/packpath
        run: alembic upgrade head
