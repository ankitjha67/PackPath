name: packpath
description: PackPath — Group trip navigation, together.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Routing
  go_router: ^14.2.7

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Storage / offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Permissions / location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Util
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
